services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vkquiz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/001_init.up.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vkquiz"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8050"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vkquiz?sslmode=disable
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8050:8050"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend/vkquiz
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8050
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
